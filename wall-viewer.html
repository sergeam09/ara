<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>ARA — Wall AR</title>

  <!-- 8th Wall engine oficial desde npm — PRIMERO -->
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
    async crossorigin="anonymous" data-preload-chunks="slam"></script>
  <!-- 8-Frame DESPUÉS -->
  <script src="//cdn.8thwall.com/web/aframe/8frame-1.4.1.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }

    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.7); color: #c8f542;
      text-align: center; padding: 12px;
      font-family: monospace; font-size: 12px;
      letter-spacing: 0.1em; z-index: 500;
      pointer-events: none;
    }
    #closeBtn {
      position: fixed; top: 8px; right: 12px;
      background: rgba(10,10,10,0.82);
      border: 1px solid rgba(255,255,255,0.1);
      color: #888; font-size: 12px; padding: 8px 14px;
      cursor: pointer; font-family: monospace; z-index: 600;
    }
    #dbgLog {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.85); color: #c8f542;
      font-family: monospace; font-size: 11px;
      padding: 8px; max-height: 35vh; overflow-y: auto;
      z-index: 9000; pointer-events: none;
    }
  </style>
</head>
<body>

<div id="hud">Iniciando Wall AR...</div>
<button id="closeBtn" onclick="history.back()">✕</button>
<div id="dbgLog"></div>

<a-scene
  xrconfig
  xrweb="allowedDevices: any; disableWorldTracking: false;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets timeout="15000">
    <video id="wallVid" playsinline webkit-playsinline
      crossorigin="anonymous" preload="auto" muted>
    </video>
  </a-assets>

  <a-camera position="0 1.6 0" look-controls="enabled: false"></a-camera>

  <a-ring id="reticle"
    radius-inner="0.06" radius-outer="0.1"
    rotation="-90 0 0"
    material="color: #c8f542; shader: flat; side: double"
    visible="false">
  </a-ring>

  <a-entity id="anchor" visible="false">
    <a-video id="wallContent" src="#wallVid"
      position="0 0 0.01" visible="true">
    </a-video>
  </a-entity>

</a-scene>

<script>
  const P = new URLSearchParams(location.search);
  const PROJECT = P.get('p');
  const CE  = P.get('ce') || 'mp4';
  const W   = parseFloat(P.get('w'))  || 1;
  const H   = parseFloat(P.get('h'))  || 0.5625;
  const LOOP = P.get('lp') !== '0';
  const BASE = location.href.split('/wall-viewer.html')[0];

  function dbg(msg, color) {
    console.log('[ARA]', msg);
    const log = document.getElementById('dbgLog');
    const line = document.createElement('div');
    line.style.color = color || '#c8f542';
    line.style.padding = '2px 0';
    line.textContent = new Date().toLocaleTimeString() + ' ' + msg;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }

  function setHud(msg) {
    document.getElementById('hud').textContent = msg;
  }

  // Configurar video y dimensiones
  const vid = document.getElementById('wallVid');
  vid.src  = BASE + '/proyectos/' + PROJECT + '/contenido.' + CE;
  vid.loop = LOOP;

  document.getElementById('wallContent').setAttribute('width',  W);
  document.getElementById('wallContent').setAttribute('height', H);

  const scene = document.querySelector('a-scene');

  scene.addEventListener('loaded', () => {
    dbg('a-scene loaded', '#42f58d');
    setHud('Escena lista — esperando SLAM...');
  });

  scene.addEventListener('realityready', () => {
    dbg('realityready — SLAM activo!', '#42f58d');
    setHud('Mueve el teléfono hacia una superficie');
    iniciarHitTest();
  });

  scene.addEventListener('realityerror', (e) => {
    dbg('realityerror: ' + JSON.stringify(e.detail), '#ff4545');
    setHud('Error: ' + (e.detail && e.detail.msg || 'desconocido'));
  });

  scene.addEventListener('xrtrackingstatus', (e) => {
    dbg('tracking: ' + JSON.stringify(e.detail), '#42f58d');
  });

  function iniciarHitTest() {
    let placed = false;
    let hitPos = null;

    function loop() {
      if (placed) return;
      if (!window.XR8 || !XR8.XrController || !XR8.XrController.hitTest) {
        setTimeout(loop, 200);
        return;
      }
      try {
        const hits = XR8.XrController.hitTest(0.5, 0.5, ['FEATURE_POINT', 'PLANE']);
        if (hits && hits.length > 0) {
          hitPos = hits[0].position;
          const reticle = document.getElementById('reticle');
          reticle.setAttribute('visible', true);
          reticle.setAttribute('position',
            hitPos.x + ' ' + hitPos.y + ' ' + hitPos.z);
          setHud('Superficie detectada — toca para colocar');
        }
      } catch(e) {
        dbg('hitTest: ' + e, '#f5a623');
      }
      if (!placed) requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    document.addEventListener('touchstart', () => {
      if (placed || !hitPos) { dbg('sin posición', '#f5a623'); return; }
      placed = true;

      const anchor = document.getElementById('anchor');
      anchor.setAttribute('position', hitPos.x + ' ' + hitPos.y + ' ' + hitPos.z);
      anchor.setAttribute('visible', true);

      document.getElementById('reticle').setAttribute('visible', false);

      vid.muted = true;
      vid.play().then(() => dbg('video OK', '#42f58d'))
                .catch(e => dbg('video: ' + e, '#f5a623'));

      setHud('¡Contenido colocado!');
      dbg('anclado', '#42f58d');
    }, {once: true});
  }

  dbg('wall-viewer cargado — PROJECT:' + PROJECT);
</script>
</body>
</html>
