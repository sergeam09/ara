<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>ARA — Wall AR</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; touch-action:auto; }

    #startScreen {
      position:fixed; inset:0; background:#0a0a0a;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:28px; z-index:2000; padding:40px; text-align:center;
    }
    .slogo { font-family:Georgia,serif; font-size:52px; color:#c8f542; }
    .ssub  { font-size:10px; color:#333; letter-spacing:0.22em; text-transform:uppercase; }
    .sname { font-size:13px; color:#555; }
    .sbtn  {
      background:#c8f542; color:#0a0a0a; border:none;
      padding:16px 40px; font-size:12px;
      letter-spacing:0.15em; text-transform:uppercase;
      cursor:pointer; font-family:system-ui,monospace;
    }
    .shint { font-size:10px; color:#222; line-height:1.8; max-width:260px; }

    /* Cámara de fondo */
    #cam {
      position:fixed; inset:0; width:100%; height:100%;
      object-fit:cover; z-index:1; display:none;
    }

    /* HUD */
    #hud {
      position:fixed; top:0; left:0; right:0;
      padding:18px 20px; display:none;
      justify-content:space-between; align-items:center;
      z-index:10;
    }
    #hud.show { display:flex; }
    .hlogo { font-size:15px; color:rgba(200,245,66,0.9); font-family:system-ui,monospace; }
    .hbtn {
      background:rgba(10,10,10,0.85); border:1px solid rgba(255,255,255,0.1);
      color:#888; font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
      padding:8px 14px; cursor:pointer; font-family:system-ui,monospace;
    }

    /* Instrucción */
    #instruccion {
      position:fixed; bottom:120px; left:0; right:0;
      text-align:center; font-family:system-ui,monospace;
      font-size:13px; color:#fff;
      text-shadow:0 2px 8px rgba(0,0,0,0.9);
      letter-spacing:0.08em; z-index:10;
      display:none;
    }
    #instruccion.show { display:block; }

    /* Contenido AR superpuesto */
    #arContent {
      position:fixed; z-index:5;
      display:none;
      transform-origin:center center;
    }
    #arContent.show { display:block; }
    #arContent video, #arContent img {
      width:100%; height:100%; object-fit:cover;
      border-radius:4px;
    }

    /* Model Viewer para 3D */
    #mvWrap {
      position:fixed; inset:0; z-index:5; display:none;
    }
    #mvWrap.show { display:block; }
    model-viewer { width:100%; height:100%; background:#000; }

    #ping {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:56px; height:56px; border:2px solid #c8f542;
      border-radius:50%; opacity:0; pointer-events:none; z-index:20;
    }
    #ping.go { animation:pg 0.6s ease-out forwards; }
    @keyframes pg {
      0%  { opacity:1; transform:translate(-50%,-50%) scale(0.5); }
      100%{ opacity:0; transform:translate(-50%,-50%) scale(2); }
    }
  </style>
</head>
<body>

<div id="startScreen">
  <div class="slogo">ARA</div>
  <div class="ssub">Augmented Reality Atelier</div>
  <div style="width:40px;height:1px;background:#1e1e1e;"></div>
  <div class="sname" id="startName"></div>
  <button class="sbtn" onclick="arrancar()">▶ Iniciar experiencia</button>
  <div class="shint">Apunta a una pared y toca la pantalla para colocar el contenido</div>
</div>

<!-- Cámara trasera como fondo -->
<video id="cam" autoplay playsinline muted></video>

<div id="hud">
  <div class="hlogo">ARA</div>
  <button class="hbtn" onclick="cerrar()">✕</button>
</div>

<div id="instruccion">Toca la pantalla para colocar</div>
<div id="ping"></div>

<!-- Contenido superpuesto -->
<div id="arContent"></div>

<!-- Model Viewer para 3D -->
<div id="mvWrap"></div>

<script>
  const P = new URLSearchParams(location.search);
  const PROJECT = P.get('p');
  const TYPE = P.get('t') || 'wall-video';
  const CE   = P.get('ce') || 'mp4';
  const W    = parseFloat(P.get('w'))  || 1;
  const H    = parseFloat(P.get('h'))  || 0.5625;
  const LOOP = P.get('lp') !== '0';
  const SC   = parseFloat(P.get('sc')) || 0.5;
  const BASE = location.href.split('/wall-viewer.html')[0];
  const CONTENT_URL = BASE + '/proyectos/' + PROJECT + '/contenido.' + CE;

  if (PROJECT) {
    document.getElementById('startName').textContent = PROJECT.replace(/-/g,' ');
  }

  let camStream = null;

  function cerrar() {
    if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
    document.getElementById('cam').style.display = 'none';
    document.getElementById('hud').classList.remove('show');
    document.getElementById('instruccion').classList.remove('show');
    document.getElementById('arContent').classList.remove('show');
    document.getElementById('arContent').innerHTML = '';
    document.getElementById('mvWrap').classList.remove('show');
    document.getElementById('mvWrap').innerHTML = '';
    document.getElementById('startScreen').style.display = 'flex';
    document.body.style.touchAction = 'auto';
  }

  async function arrancar() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('hud').classList.add('show');
    document.body.style.touchAction = 'none';

    // Modelo 3D — usar Model Viewer nativo
    if (TYPE === 'wall-model') {
      if (!document.querySelector('script[src*="model-viewer"]')) {
        const s = document.createElement('script');
        s.type = 'module';
        s.src = 'https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js';
        document.head.appendChild(s);
        await new Promise(r => s.onload = r);
      }
      const mv = document.getElementById('mvWrap');
      mv.innerHTML = `<model-viewer
        src="${CONTENT_URL}"
        ar ar-modes="webxr scene-viewer quick-look"
        ar-placement="wall" ar-scale="fixed"
        scale="${SC} ${SC} ${SC}"
        camera-controls auto-rotate shadow-intensity="0.8">
        <button slot="ar-button" style="
          position:absolute;bottom:80px;left:50%;
          transform:translateX(-50%);
          background:#c8f542;color:#0a0a0a;border:none;
          padding:16px 36px;font-size:13px;
          letter-spacing:0.12em;text-transform:uppercase;
          cursor:pointer;font-family:system-ui,monospace;">
          ▣ Colocar en pared
        </button>
      </model-viewer>`;
      mv.classList.add('show');
      return;
    }

    // Video o GIF — abrir cámara trasera y superponer contenido
    try {
      camStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: {ideal:1280}, height: {ideal:720} },
        audio: false
      });
      const camEl = document.getElementById('cam');
      camEl.srcObject = camStream;
      camEl.style.display = 'block';
      document.getElementById('instruccion').classList.add('show');
    } catch(e) {
      alert('No se pudo acceder a la cámara: ' + e.message);
      cerrar();
      return;
    }

    // Calcular tamaño del contenido en pantalla
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const maxW = vw * 0.8;
    const maxH = vh * 0.6;
    let cw, ch;
    if (W/H > maxW/maxH) { cw = maxW; ch = maxW * (H/W); }
    else { ch = maxH; cw = maxH * (W/H); }
    const cx = (vw - cw) / 2;
    const cy = (vh - ch) / 2;

    const arEl = document.getElementById('arContent');
    arEl.style.cssText = `left:${cx}px;top:${cy}px;width:${cw}px;height:${ch}px;`;

    if (TYPE === 'wall-video') {
      arEl.innerHTML = `<video src="${CONTENT_URL}"
        loop="${LOOP}" muted playsinline webkit-playsinline
        crossorigin="anonymous" style="display:none;">
      </video>`;
    } else {
      arEl.innerHTML = `<img src="${CONTENT_URL}" style="display:none;">`;
    }

    // Toque para colocar
    document.addEventListener('touchstart', colocar, { once: true });
    document.addEventListener('click',      colocar, { once: true });
  }

  function colocar() {
    const arEl = document.getElementById('arContent');
    const media = arEl.querySelector('video, img');
    if (!media) return;

    media.style.display = 'block';
    arEl.classList.add('show');

    if (media.tagName === 'VIDEO') {
      media.muted = true;
      media.play().catch(() => {});
    }

    document.getElementById('instruccion').classList.remove('show');

    const ping = document.getElementById('ping');
    ping.classList.add('go');
    setTimeout(() => ping.classList.remove('go'), 700);
  }
</script>
</body>
</html>
