<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>ARA — Wall AR</title>

  <!-- 8th Wall engine PRIMERO — antes que cualquier otro script -->
  <script src="./xr/xr.js" data-preload-chunks="slam"></script>
  <!-- 8-Frame DESPUÉS del engine -->
  <script src="//cdn.8thwall.com/web/aframe/8frame-1.4.1.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }

    #startScreen {
      position: fixed; inset: 0; background: #0a0a0a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px; z-index: 9999; padding: 40px; text-align: center;
    }
    .slogo { font-family: Georgia,serif; font-size: 52px; color: #c8f542; }
    .ssub  { font-size: 10px; color: #333; letter-spacing: 0.22em; text-transform: uppercase; }
    .sname { font-size: 13px; color: #555; }
    .sbtn  {
      background: #c8f542; color: #0a0a0a; border: none;
      padding: 16px 40px; font-size: 13px;
      letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; font-family: monospace;
    }

    #status {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.75); color: #c8f542;
      text-align: center; padding: 12px;
      font-family: monospace; font-size: 12px;
      letter-spacing: 0.1em; z-index: 500;
      pointer-events: none; display: none;
    }
    #status.show { display: block; }

    #closeBtn {
      position: fixed; top: 12px; right: 12px;
      background: rgba(10,10,10,0.82); border: 1px solid rgba(255,255,255,0.08);
      color: #888; font-size: 12px; padding: 8px 14px;
      cursor: pointer; font-family: monospace; z-index: 600;
      display: none;
    }
    #closeBtn.show { display: block; }

    #ping {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 56px; height: 56px; border: 2px solid #c8f542;
      border-radius: 50%; opacity: 0; pointer-events: none; z-index: 500;
    }
    #ping.go { animation: pg 0.6s ease-out forwards; }
    @keyframes pg {
      0%  { opacity:1; transform:translate(-50%,-50%) scale(0.5); }
      100%{ opacity:0; transform:translate(-50%,-50%) scale(2); }
    }

    #dbgLog {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.85); color: #c8f542;
      font-family: monospace; font-size: 11px;
      padding: 8px 12px; max-height: 40vh; overflow-y: auto;
      z-index: 9000; display: none; pointer-events: none;
    }
  </style>
</head>
<body>

<div id="startScreen">
  <div class="slogo">ARA</div>
  <div class="ssub">Augmented Reality Atelier</div>
  <div style="width:40px;height:1px;background:#1e1e1e;"></div>
  <div class="sname" id="startName"></div>
  <button class="sbtn" id="startBtn">▶ Iniciar experiencia</button>
  <div style="font-size:10px;color:#222;letter-spacing:0.08em;line-height:1.8;max-width:240px;">
    Se solicitará acceso a la cámara al iniciar
  </div>
</div>

<div id="status">Iniciando...</div>
<button id="closeBtn" onclick="cerrar()">✕</button>
<div id="ping"></div>
<div id="dbgLog"></div>

<!-- Escena A-Frame — oculta hasta que se inicie -->
<a-scene
  id="arScene"
  xrconfig
  xrweb="allowedDevices: any; disableWorldTracking: false;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  style="display:none;">

  <a-assets timeout="15000">
    <video id="wallVid" playsinline webkit-playsinline
      crossorigin="anonymous" preload="auto" muted>
    </video>
  </a-assets>

  <a-camera position="0 1.6 0" look-controls="enabled: false"></a-camera>

  <a-ring id="reticle"
    radius-inner="0.06" radius-outer="0.1"
    rotation="-90 0 0"
    material="color: #c8f542; shader: flat; side: double"
    visible="false">
  </a-ring>

  <a-entity id="anchor" visible="false">
    <a-video id="wallContent" width="1" height="0.5625"
      position="0 0 0.01" src="#wallVid"
      visible="true">
    </a-video>
  </a-entity>

</a-scene>

<script>
  // ── PARÁMETROS ──
  const P       = new URLSearchParams(location.search);
  const PROJECT = P.get('p');
  const CE      = P.get('ce') || 'mp4';
  const W       = parseFloat(P.get('w'))  || 1;
  const H       = parseFloat(P.get('h'))  || 0.5625;
  const LOOP    = P.get('lp') !== '0';
  const TYPE    = P.get('t') || 'wall-video';

  const BASE = location.href.split('/wall-viewer.html')[0];
  const CONTENT_URL = BASE + '/proyectos/' + PROJECT + '/contenido.' + CE;

  // Nombre del proyecto
  if (PROJECT) {
    document.getElementById('startName').textContent = PROJECT.replace(/-/g,' ');
  }

  // Debug
  function dbg(msg, color) {
    console.log('[ARA]', msg);
    const log = document.getElementById('dbgLog');
    if (!log) return;
    log.style.display = 'block';
    const line = document.createElement('div');
    line.style.color = color || '#c8f542';
    line.style.padding = '2px 0';
    line.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
    line.textContent = new Date().toLocaleTimeString() + ' ' + msg;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function cerrar() {
    document.getElementById('startScreen').style.display = 'flex';
    document.getElementById('status').classList.remove('show');
    document.getElementById('closeBtn').classList.remove('show');
    document.getElementById('arScene').style.display = 'none';
    const vid = document.getElementById('wallVid');
    if (vid) vid.pause();
  }

  // ── ARRANCAR ──
  document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('status').classList.add('show');
    document.getElementById('closeBtn').classList.add('show');
    setStatus('Iniciando Wall AR...');
    dbg('iniciando');
    arrancar();
  });

  function arrancar() {
    // Configurar video
    const vid = document.getElementById('wallVid');
    vid.src  = CONTENT_URL;
    vid.loop = LOOP;

    // Configurar dimensiones del contenido
    const content = document.getElementById('wallContent');
    if (content) {
      content.setAttribute('width',  W);
      content.setAttribute('height', H);
    }

    // Mostrar escena
    const scene = document.getElementById('arScene');
    scene.style.display = 'block';

    dbg('escena visible — esperando eventos 8th Wall');

    // Eventos de 8th Wall
    scene.addEventListener('realityready', () => {
      dbg('realityready — SLAM activo!', '#42f58d');
      setStatus('Mueve el teléfono hacia una superficie');
      iniciarHitTest(scene);
    });

    scene.addEventListener('realityerror', (e) => {
      dbg('realityerror: ' + JSON.stringify(e.detail), '#ff4545');
      setStatus('Error AR: ' + (e.detail && e.detail.msg || 'desconocido'));
    });

    scene.addEventListener('loaded', () => {
      dbg('a-scene loaded', '#42f58d');
      setStatus('Escena lista — esperando SLAM...');
    });
  }

  function iniciarHitTest(scene) {
    let placed = false;
    let hitPos = null;
    let hitRot = null;

    function loop() {
      if (placed) return;
      if (!window.XR8 || !XR8.XrController || !XR8.XrController.hitTest) {
        setTimeout(loop, 200);
        return;
      }
      try {
        const hits = XR8.XrController.hitTest(0.5, 0.5, ['FEATURE_POINT', 'PLANE']);
        if (hits && hits.length > 0) {
          const h = hits[0];
          hitPos = h.position;
          hitRot = h.rotation;

          const reticle = document.getElementById('reticle');
          reticle.setAttribute('visible', true);
          reticle.setAttribute('position',
            hitPos.x + ' ' + hitPos.y + ' ' + hitPos.z);

          setStatus('Superficie detectada — toca para colocar');
        }
      } catch(e) {
        dbg('hitTest error: ' + e, '#f5a623');
      }
      if (!placed) requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    // Toque para colocar
    document.addEventListener('touchstart', () => {
      if (placed || !hitPos) {
        dbg('sin posición aún', '#f5a623');
        return;
      }
      placed = true;

      const anchor = document.getElementById('anchor');
      anchor.setAttribute('position',
        hitPos.x + ' ' + hitPos.y + ' ' + hitPos.z);
      if (hitRot) {
        anchor.setAttribute('rotation',
          hitRot.x + ' ' + hitRot.y + ' ' + hitRot.z);
      }
      anchor.setAttribute('visible', true);

      const reticle = document.getElementById('reticle');
      reticle.setAttribute('visible', false);

      const vid = document.getElementById('wallVid');
      vid.muted = true;
      vid.play().then(() => dbg('video OK', '#42f58d'))
                .catch(e => dbg('video: ' + e, '#f5a623'));

      setStatus('¡Contenido colocado!');

      const ping = document.getElementById('ping');
      ping.classList.add('go');
      setTimeout(() => ping.classList.remove('go'), 700);

      dbg('anclado en ' + hitPos.x.toFixed(2) + ',' +
          hitPos.y.toFixed(2) + ',' + hitPos.z.toFixed(2), '#42f58d');
    }, {once: true});
  }
</script>
</body>
</html>
