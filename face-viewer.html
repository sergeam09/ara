<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>ARA — Face Tracking</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
  <!-- Face tracking: AMBOS scripts cargados en head antes de cualquier escena -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>
  <style>
    :root {
      --navy:  #0d1117;
      --navy2: #161b26;
      --navy3: #1e2535;
      --a:     #c8f542;
      --fd:    'Montserrat', sans-serif;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
      --r: 16px; --r-sm: 10px; --r-pill: 999px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--navy); color: #e8eaf0; font-family: var(--fd); height: 100vh; overflow: hidden; touch-action: none; }

    /* START */
    #startScreen { position:fixed;inset:0;background:linear-gradient(160deg,var(--navy) 0%,var(--navy2) 60%,var(--navy3) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:2000;padding:40px;text-align:center; }
    #startScreen.hidden { display:none; }
    .start-mark { width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--a),#a8d820);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--navy);font-weight:900;box-shadow:0 8px 24px rgba(200,245,66,0.35); }
    .start-logo { font-size:42px;font-weight:900;color:#e8eaf0;letter-spacing:-0.03em;line-height:1; }
    .start-sub  { font-size:9px;color:#3a4460;letter-spacing:0.26em;text-transform:uppercase; }
    .start-card { background:linear-gradient(145deg,var(--navy2),var(--navy3));border:1px solid rgba(255,255,255,0.07);border-radius:var(--r);padding:20px 28px;min-width:260px;box-shadow:var(--shadow); }
    .start-name { font-size:16px;color:#e8eaf0;font-weight:700; }
    .start-type { font-size:10px;color:#4a5370;letter-spacing:0.16em;text-transform:uppercase;margin-top:5px;font-weight:600; }
    .start-btn  { background:linear-gradient(135deg,var(--a),#a8d820);color:var(--navy);border:none;padding:15px 44px;font-size:12px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;border-radius:var(--r-pill);box-shadow:0 4px 20px rgba(200,245,66,0.35);font-family:var(--fd);transition:all 0.2s; }
    .start-btn:hover { transform:translateY(-2px);box-shadow:0 6px 24px rgba(200,245,66,0.45); }
    .start-hint { font-size:10px;color:#2e3650;line-height:1.9;max-width:260px; }

    /* SPLASH */
    #splash { position:fixed;inset:0;background:linear-gradient(160deg,var(--navy),var(--navy2));display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px;z-index:1000;transition:opacity 0.5s; }
    #splash.visible { display:flex; }
    #splash.hidden  { opacity:0;pointer-events:none; }
    .smark { width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--a),#a8d820);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--navy);font-weight:900; }
    .slogo { font-size:36px;font-weight:900;color:#e8eaf0;letter-spacing:-0.03em; }
    .ssub  { font-size:9px;letter-spacing:0.24em;text-transform:uppercase;color:#2e3650; }
    .sbar  { width:140px;height:3px;background:rgba(255,255,255,0.05);border-radius:var(--r-pill);position:relative;overflow:hidden; }
    .sbar::after { content:'';position:absolute;left:-40%;width:40%;height:100%;background:linear-gradient(90deg,var(--a),#a8d820);animation:sl 1.2s ease-in-out infinite;border-radius:var(--r-pill); }
    @keyframes sl { to{left:140%;} }
    .smsg  { font-size:11px;color:#3a4460;font-weight:600; }

    /* ERROR */
    #errScreen { position:fixed;inset:0;background:var(--navy);display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:36px;text-align:center;z-index:1001; }
    #errScreen.show { display:flex; }
    .etitle { font-size:16px;color:#ff4d4d;font-weight:800; }
    .emsg   { font-size:12px;color:#4a5370;line-height:1.9;max-width:300px; }
    .ebtn   { background:linear-gradient(135deg,var(--a),#a8d820);color:var(--navy);border:none;padding:12px 28px;font-size:11px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;border-radius:var(--r-pill);font-family:var(--fd); }

    /* HUD */
    #hud { position:fixed;top:0;left:0;right:0;padding:20px;display:none;justify-content:space-between;align-items:flex-start;z-index:500;pointer-events:none; }
    #hud.show { display:flex; }
    .hlogo { background:linear-gradient(145deg,var(--navy2),var(--navy3));border:1px solid rgba(255,255,255,0.08);border-radius:var(--r-sm);padding:8px 14px;font-size:13px;color:rgba(200,245,66,0.9);font-weight:900;letter-spacing:0.05em; }
    .hbtn  { pointer-events:all;background:linear-gradient(145deg,var(--navy2),var(--navy3));border:1px solid rgba(255,255,255,0.08);color:#6b7a99;font-size:10px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;padding:9px 16px;cursor:pointer;border-radius:var(--r-pill);font-family:var(--fd);transition:all 0.2s; }
    .hbtn:hover { color:var(--a); }

    /* FACE SCAN OVERLAY */
    #faceScan { position:fixed;top:50%;left:0;right:0;transform:translateY(-50%);display:none;flex-direction:column;align-items:center;gap:16px;z-index:500;pointer-events:none; }
    #faceScan.show { display:flex; }
    /* Óvalo más grande para facilitar encuadre */
    .face-oval { width:260px;height:340px;border-radius:50%;border:2px solid var(--a);opacity:0.85;position:relative;animation:fpulse 2s ease-in-out infinite; }
    @keyframes fpulse { 0%,100%{box-shadow:0 0 0 0 rgba(200,245,66,0.3)} 50%{box-shadow:0 0 0 18px rgba(200,245,66,0)} }
    .face-line { position:absolute;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--a),transparent);animation:fline 2.5s ease-in-out infinite;top:0; }
    @keyframes fline { 0%,100%{top:10%;opacity:0}20%{opacity:1}80%{opacity:1}100%{top:90%;opacity:0} }
    .face-txt { font-size:12px;color:rgba(200,245,66,0.9);letter-spacing:0.14em;text-transform:uppercase;text-shadow:0 2px 12px rgba(0,0,0,0.95);font-weight:800; }
    .face-hint { font-size:10px;color:rgba(200,245,66,0.5);letter-spacing:0.1em;text-align:center;max-width:260px;line-height:1.6;font-weight:600; }

    /* Espejo de cámara — la cámara frontal se muestra invertida por defecto,
       aplicar mirror hace que la experiencia sea más intuitiva */
    #arScene canvas { transform: scaleX(-1); }

    /* SCENE */
    #arScene { display:none;width:100vw;height:100vh; }
    #arScene.show { display:block; }
  </style>
</head>
<body>

<div id="startScreen">
  <div class="start-mark">◈</div>
  <div>
    <div class="start-logo">ARA</div>
    <div class="start-sub">Face Tracking</div>
  </div>
  <div class="start-card">
    <div class="start-name" id="startName">Cargando...</div>
    <div class="start-type" id="startType">Face AR</div>
  </div>
  <button class="start-btn" onclick="arrancarExperiencia()">◉ Activar cámara frontal</button>
  <div class="start-hint">Centra tu cara en el óvalo · Usa la cámara frontal de tu dispositivo</div>
</div>

<div id="splash">
  <div class="smark">◈</div>
  <div class="slogo">ARA</div>
  <div class="ssub">Face Tracking</div>
  <div class="sbar"></div>
  <div class="smsg" id="smsg">Iniciando...</div>
</div>

<div id="errScreen">
  <div class="etitle">Algo salió mal</div>
  <div class="emsg" id="emsg">Error desconocido.</div>
  <button class="ebtn" onclick="location.reload()">Reintentar</button>
  <button class="ebtn" style="background:transparent;color:#4a5370;border:1px solid rgba(255,255,255,0.08);margin-top:4px;" onclick="history.back()">Volver</button>
</div>

<div id="hud">
  <div class="hlogo">ARA</div>
  <button class="hbtn" onclick="cerrarViewer()">✕ Cerrar</button>
</div>

<div id="faceScan">
  <div class="face-oval"><div class="face-line"></div></div>
  <div class="face-txt">Centra tu cara en el óvalo</div>
  <div class="face-hint">Si la imagen aparece invertida, es normal —<br>muévete en la dirección opuesta a lo que ves</div>
</div>

<div id="arScene"></div>

<script>
  const P       = new URLSearchParams(location.search);
  const PROJECT = P.get('p');
  const TYPE    = P.get('t') || 'face-model';
  const CE      = P.get('ce') || 'glb';
  const URL_FA  = parseInt(P.get('fa'))   || 0;
  const URL_FS  = parseFloat(P.get('fs')) || 0.1;

  const BASE = (() => {
    const { protocol, host, pathname } = location;
    return `${protocol}//${host}${pathname.replace('face-viewer.html','').replace(/\/$/,'')}`;
  })();

  const CONTENT_URL = `${BASE}/proyectos/${PROJECT}/contenido.${CE}`;
  const CONFIG_URL  = `${BASE}/proyectos/${PROJECT}/config.json`;

  let faceAnchor = URL_FA;
  let faceScale  = URL_FS;

  document.getElementById('startName').textContent = PROJECT ? PROJECT.replace(/-/g,' ') : '';

  if (!PROJECT) {
    document.getElementById('startScreen').classList.add('hidden');
    showErr('No se especificó ningún proyecto.');
  }

  function arrancarExperiencia() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('splash').classList.add('visible');
    loadConfigAndBuild();
  }

  async function loadConfigAndBuild() {
    setSplash('Cargando configuración...');
    try {
      const r = await fetch(CONFIG_URL);
      if (r.ok) {
        const cfg = await r.json();
        if (cfg.faceAnchor !== undefined) faceAnchor = cfg.faceAnchor;
        if (cfg.faceScale  !== undefined) faceScale  = cfg.faceScale;
      }
    } catch(e) {}
    setSplash('Preparando face tracking...');
    buildScene();
  }

  function buildScene() {
    const sc  = faceScale || 0.1;
    const scl = `${sc} ${sc} ${sc}`;

    let assetHTML  = '';
    let entityHTML = '';

    if (TYPE === 'face-model') {
      assetHTML  = `<a-asset-item id="face-asset" src="${CONTENT_URL}"></a-asset-item>`;
      entityHTML = `<a-gltf-model src="#face-asset" position="0 0 0" scale="${scl}"></a-gltf-model>`;
    } else if (TYPE === 'face-gif' || TYPE === 'face-image') {
      assetHTML  = `<img id="face-asset" src="${CONTENT_URL}" crossorigin="anonymous">`;
      entityHTML = `<a-image src="#face-asset" width="${sc}" height="${sc}" position="0 0 0"></a-image>`;
    } else if (TYPE === 'face-video') {
      assetHTML  = `<video id="face-asset" src="${CONTENT_URL}" loop autoplay muted playsinline webkit-playsinline crossorigin="anonymous"></video>`;
      entityHTML = `<a-video src="#face-asset" width="${sc}" height="${sc * 0.5625}" position="0 0 0"></a-video>`;
    }

    const sceneDiv = document.getElementById('arScene');
    sceneDiv.innerHTML = `
      <a-scene
        mindar-face="autoStart:true;"
        embedded
        color-space="sRGB"
        renderer="colorManagement:true"
        vr-mode-ui="enabled:false"
        device-orientation-permission-ui="enabled:false"
        style="width:100vw;height:100vh;">
        <a-assets timeout="15000">
          ${assetHTML}
        </a-assets>
        <a-entity mindar-face-target="anchorIndex:${faceAnchor}">
          ${entityHTML}
        </a-entity>
      </a-scene>`;

    sceneDiv.classList.add('show');
    document.getElementById('hud').classList.add('show');
    document.getElementById('faceScan').classList.add('show');

    setTimeout(() => {
      const scene = sceneDiv.querySelector('a-scene');
      if (!scene) { showErr('No se pudo inicializar la escena.'); return; }

      scene.addEventListener('loaded', () => {
        setSplash('Activando cámara frontal...');
      });

      scene.addEventListener('arReady', () => {
        document.getElementById('faceScan').classList.remove('show');
        hideSplash();
      });

      scene.addEventListener('arError', (e) => {
        showErr('No se pudo acceder a la cámara frontal.<br>Verifica los permisos en tu navegador.<br><small style="color:#2e3650">Requiere HTTPS y cámara frontal.</small>');
      });

      // Fallback ocultar splash
      setTimeout(() => hideSplash(), 14000);
    }, 400);
  }

  function cerrarViewer() {
    try {
      const s = document.querySelector('a-scene');
      if (s && s.renderer) s.renderer.setAnimationLoop(null);
    } catch(e) {}
    document.getElementById('arScene').classList.remove('show');
    document.getElementById('arScene').innerHTML = '';
    document.getElementById('hud').classList.remove('show');
    document.getElementById('faceScan').classList.remove('show');
    document.getElementById('splash').classList.remove('visible');
    document.getElementById('startScreen').classList.remove('hidden');
  }

  function setSplash(msg) { document.getElementById('smsg').textContent = msg; }
  function hideSplash() {
    const s = document.getElementById('splash');
    s.classList.add('hidden');
    setTimeout(() => s.classList.remove('visible','hidden'), 600);
  }
  function showErr(msg) {
    hideSplash();
    document.getElementById('emsg').innerHTML = msg;
    document.getElementById('errScreen').classList.add('show');
  }
</script>
</body>
</html>
